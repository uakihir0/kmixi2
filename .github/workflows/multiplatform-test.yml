name: Kotlin Multiplatform Tests
on: [push]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linuxX64Test
          - os: windows-latest
            target: jvmTest
          - os: macos-latest
            target: macosArm64Test
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        shell: bash
        env:
          MIXI2_HOST: ${{ secrets.MIXI2_HOST }}
          MIXI2_STREAM_HOST: ${{ secrets.MIXI2_STREAM_HOST }}
          MIXI2_CLIENT_ID: ${{ secrets.MIXI2_CLIENT_ID }}
          MIXI2_CLIENT_SECRET: ${{ secrets.MIXI2_CLIENT_SECRET }}
          MIXI2_TOKEN_ENDPOINT: ${{ secrets.MIXI2_TOKEN_ENDPOINT }}
          MIXI2_TEST_ROOM_ID: ${{ secrets.MIXI2_TEST_ROOM_ID }}
        run: |
          ./gradlew core:${{ matrix.target }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.target }}
          path: core/build/reports/tests/
